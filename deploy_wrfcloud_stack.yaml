AWSTemplateFormatVersion: "2010-09-09"
Description: Minimal WRFCloud infrastructure
Resources:
  WrfCloudBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "wrfcloud-${AWS::AccountId}-${AWS::Region}"
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: WrfCloudPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: "*"
                Resource: "*"
  WrfCloudFunction:
    Type: AWS::Lambda::Function
    Properties:
      Code:
        S3Bucket: !Ref WrfCloudBucket
        S3Key: lambda_function.zip
      Handler: lambda_wrapper.lambda_handler
      Role: !GetAtt LambdaRole.Arn
      Runtime: python3.9
Outputs:
  BucketName:
    Value: !Ref WrfCloudBucket
